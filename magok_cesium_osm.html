<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>마곡동 3D 디지털트윈 (실제 건물)</title>
<script src="https://cesium.com/downloads/cesiumjs/releases/1.118/Build/Cesium/Cesium.js"></script>
<link href="https://cesium.com/downloads/cesiumjs/releases/1.118/Build/Cesium/Widgets/widgets.css" rel="stylesheet">
<style>
  @import url('https://fonts.googleapis.com/css2?family=Black+Han+Sans&family=Gowun+Dodum&display=swap');
  html, body, #cesiumContainer { width:100%; height:100%; margin:0; padding:0; overflow:hidden; }
  body { font-family:'Gowun Dodum', sans-serif; }
  #panel {
    position:absolute; top:16px; left:16px; z-index:10;
    background:rgba(10,14,26,.88); backdrop-filter:blur(10px);
    border:1px solid #283149; border-radius:14px; padding:18px 20px;
    color:#e8eaf0; max-width:300px;
  }
  #panel h1 {
    font-family:'Black Han Sans'; font-size:20px; line-height:1.2;
    background:linear-gradient(120deg,#4dd0e1,#ff7043);
    -webkit-background-clip:text; background-clip:text; -webkit-text-fill-color:transparent;
  }
  #panel .sub { font-size:12px; color:#8a93a8; margin:6px 0 14px; }
  .btn {
    display:block; width:100%; margin:6px 0; padding:10px 14px;
    background:#161d31; color:#aeb6c8; border:1px solid #283149;
    border-radius:9px; font-family:inherit; font-size:13px; cursor:pointer;
    transition:all .2s; text-align:left;
  }
  .btn:hover { background:#1d2740; color:#fff; }
  .btn.active { background:linear-gradient(120deg,#1e3a5f,#2a3f6b); color:#fff; border-color:#4dd0e1; }
  .legend { margin-top:14px; font-size:12px; }
  .lg { display:flex; align-items:center; gap:7px; margin:5px 0; }
  .dot { width:12px; height:12px; border-radius:3px; }
  .hint { margin-top:14px; font-size:11px; color:#5a637a; line-height:1.5; }
  #loading {
    position:absolute; top:50%; left:50%; transform:translate(-50%,-50%);
    z-index:20; color:#4dd0e1; font-size:18px; font-family:'Black Han Sans';
  }
</style>
</head>
<body>
<div id="cesiumContainer"></div>
<div id="loading">실제 건물 불러오는 중...</div>

<div id="panel">
  <h1>마곡동 에너지<br>디지털트윈</h1>
  <div class="sub">실제 3D 건물 · OSM Buildings</div>
  <button class="btn active" data-mode="cluster">🏢 군집 유형</button>
  <button class="btn" data-mode="total">⚡ 연간 에너지량</button>
  <button class="btn" data-mode="summer">☀️ 여름 피크 집중도</button>
  <div class="legend" id="legend"></div>
  <button class="btn" id="rotateBtn" style="margin-top:14px;">🔄 자동 회전</button>
  <div class="hint">실제 건물 형태 위에 우리 에너지 데이터를 색으로 입혔습니다.
    색은 가장 가까운 분석 격자 기준(위치 매칭이라 근사).</div>
</div>

<script>
// ====== 본인 Cesium Ion 토큰으로 교체! (cesium.com 무료 가입) ======
Cesium.Ion.defaultAccessToken = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJqdGkiOiI5Nzk0MzgyNS03N2M4LTRlZTgtOTQ2NS04OGM4ZDIyMzI1NzEiLCJpZCI6NDM3MDg0LCJpc3MiOiJodHRwczovL2FwaS5jZXNpdW0uY29tIiwiYXVkIjoidW5kZWZpbmVkX2RlZmF1bHQiLCJpYXQiOjE3Nzk4ODY0NTl9.J_plEGjQGM9pPNn9cWunUY1Ac-iePAt9MzHnATHc1kY';

const viewer = new Cesium.Viewer('cesiumContainer', {
  terrain: Cesium.Terrain.fromWorldTerrain(),
  animation:false, timeline:false, geocoder:false,
  homeButton:false, navigationHelpButton:false, baseLayerPicker:false,
});
viewer.scene.globe.enableLighting = true;

let lookup = {};       // "gx_gy" → {color, t_norm, s_norm}
let gridSize = 0.0004;
let currentMode = 'cluster';
let osmBuildings;

function heatHex(t){
  const r=Math.round(255*Math.min(1,t*1.6));
  const g=Math.round(255*Math.min(1, t<0.5?t*2:(1-t)*1.4+0.3));
  const b=Math.round(255*Math.max(0,1-t*1.8));
  return `rgb(${r},${g},${b})`;
}

const legends = {
  cluster:[['냉방집중형 (ESS 우선)','#ff5252'],['중간형','#ffb74d'],['분산형','#4dd0e1']],
  total:[['에너지 적음','#3a6ad4'],['중간','#ffd54f'],['많음','#ff5252']],
  summer:[['여름집중 낮음','#3a6ad4'],['중간','#ffd54f'],['높음(ESS우선)','#ff5252']],
};
function setLegend(mode){
  document.getElementById('legend').innerHTML = legends[mode].map(
    ([t,c])=>`<div class="lg"><span class="dot" style="background:${c}"></span>${t}</div>`).join('');
  document.querySelectorAll('.btn[data-mode]').forEach(b=>
    b.classList.toggle('active', b.dataset.mode===mode));
}

// 핵심: 건물마다 위치→격자→색을 '함수'로 즉시 계산 (조건식 X, 빠름)
function applyStyle(mode){
  currentMode = mode;
  if(!osmBuildings) return;
  osmBuildings.style = new Cesium.Cesium3DTileStyle();
  osmBuildings.tileVisible.removeEventListener(colorTiles);
  osmBuildings.tileVisible.addEventListener(colorTiles);
  // 이미 로드된 타일도 다시 칠하기
  viewer.scene.requestRender();
  setLegend(mode);
}

function colorTiles(tile){
  const content = tile.content;
  const n = content.featuresLength;
  for(let i=0;i<n;i++){
    const f = content.getFeature(i);
    const lon = f.getProperty('cesium#longitude');
    const lat = f.getProperty('cesium#latitude');
    if(lon===undefined || lat===undefined){ continue; }
    const key = Math.round(lon/gridSize)+'_'+Math.round(lat/gridSize);
    const cell = lookup[key];
    if(!cell){ f.color = Cesium.Color.fromCssColorString('#3a3f55'); continue; }
    let col;
    if(currentMode==='cluster') col = cell.color;
    else if(currentMode==='total') col = heatHex(cell.t_norm);
    else col = heatHex(cell.s_norm);
    f.color = Cesium.Color.fromCssColorString(col);
  }
}

fetch('grid_colors.json').then(r=>r.json()).then(async data=>{
  gridSize = data.meta.grid_size;
  // 빠른 조회용 lookup 테이블 구성
  for(const c of data.cells){
    const key = Math.round(c.lon/gridSize)+'_'+Math.round(c.lat/gridSize);
    lookup[key] = c;
  }
  const clon = data.cells.reduce((s,c)=>s+c.lon,0)/data.cells.length;
  const clat = data.cells.reduce((s,c)=>s+c.lat,0)/data.cells.length;

  osmBuildings = await Cesium.createOsmBuildingsAsync();
  viewer.scene.primitives.add(osmBuildings);

  document.getElementById('loading').style.display='none';
  viewer.camera.flyTo({
    destination: Cesium.Cartesian3.fromDegrees(clon, clat-0.012, 1800),
    orientation:{ heading:0, pitch:Cesium.Math.toRadians(-35), roll:0 },
    duration:2.5,
  });
  applyStyle('cluster');
}).catch(err=>{
  document.getElementById('loading').innerHTML =
    'grid_colors.json을 못 찾았어요.<br>로컬 서버(python -m http.server)로 여세요.<br>'+err;
});

let rotating=false;
viewer.clock.onTick.addEventListener(()=>{ if(rotating) viewer.camera.rotate(Cesium.Cartesian3.UNIT_Z,-0.0015); });
document.getElementById('rotateBtn').addEventListener('click',()=>{ rotating=!rotating; });
document.querySelectorAll('.btn[data-mode]').forEach(b=>
  b.addEventListener('click',()=>applyStyle(b.dataset.mode)));
</script>
</script>
</body>
</html>
